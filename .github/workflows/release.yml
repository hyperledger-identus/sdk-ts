name: Release wallet-sdk-ts

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.IDENTUS_CI }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"

      - name: Enable Corepack
        run: corepack enable

      # Ensure npm version >= 11.5.1 (lowest supporting trusted publishing)
      - name: Upgrade npm
        run: npm install -g npm@^11.5.1

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: crazy-max/ghaction-import-gpg@v5
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.HYP_BOT_GPG_PRIVATE }}
          passphrase:  ${{ secrets.HYP_BOT_GPG_PASSWORD }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_tag_gpgsign: false

      - name: Build and version
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GIT_AUTHOR_EMAIL: ${{ steps.import_gpg.outputs.email }}
          GIT_COMMITTER_EMAIL: ${{ steps.import_gpg.outputs.email }}
          GIT_AUTHOR_NAME: ${{ steps.import_gpg.outputs.name }}
          GIT_COMMITTER_NAME: ${{ steps.import_gpg.outputs.name }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.IDENTUS_CI }}
        run: |
          echo "Using npm version: $(npm -v)"
          yarn install
          npm audit signatures
          yarn build

          if [[ "$GITHUB_REF" == *"refs/heads/beta"* ]]; then
            echo "Publishing with RC tag for beta branch"
            npx nx release version --preid rc
            npx nx release publish --tag rc
          else
            echo "Publishing without RC tag for main branch"
            npx nx release version
            npx nx release changelog
            npx nx release publish
            git push --follow-tags origin HEAD:${GITHUB_REF_NAME}
          fi
          