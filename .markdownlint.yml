# markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow long lines (common in tables, URLs, and generated content)
MD013: false

# Allow multiple top-level headings (common in multi-section docs)
MD025: false

# Allow inline HTML (needed for badges, details/summary, etc.)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow first line to be HTML (centered logos in READMEs)
MD041: false

# Allow sequential ordered list numbering
MD029:
  style: "ordered"

# Allow heading level jumps (common in CHANGELOG.md)
MD001: false

# Disable table column style (nix/CI version gap — rule added in v0.39.0)
MD060: false

# Allow emphasis used as heading
MD036: false

# Allow code blocks without language
MD040: false

# Allow blank lines inside blockquotes
MD028: false
